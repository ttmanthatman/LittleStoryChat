version: '3.8'

services:
  # Node.js 后端服务
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: hichat-server
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - DB_PATH=/app/data/hichat.db
    volumes:
      - server-data:/app/data
    networks:
      - hichat-network
    depends_on:
      - nginx

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: hichat-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./client/dist:/var/www/html:ro
      - nginx-logs:/var/log/nginx
    networks:
      - hichat-network

volumes:
  server-data:
    driver: local
  nginx-logs:
    driver: local

networks:
  hichat-network:
    driver: bridge
